name: ${PROJECT_NAME:-agenticflow}-${ENV_NAME:-main}

services:
  # ─── Auth Proxy (Caddy) ───────────────────────────────────────────────────
  proxy:
    image: caddy:alpine
    ports:
      - "${PROXY_PORT:-18080}:18080"
    environment:
      - AGENTICFLOW_REMOTE_ENABLED=${AGENTICFLOW_REMOTE_ENABLED:-false}
      - AGENTICFLOW_REMOTE_USER=${AGENTICFLOW_REMOTE_USER:-disabled_user}
      - AGENTICFLOW_REMOTE_PASSWORD_HASH=${AGENTICFLOW_REMOTE_PASSWORD_HASH:-$$2b$$10$$L5M3KsKmofKzl8T/eEYVfeZ9/BpQeAipA3uajx3MmxtFdHRBu8i4W}
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - gateway
    restart: unless-stopped

  # ─── MCPJungle Gateway ────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    # The gateway is now shielded by the auth proxy and not exposed to the host directly.
    environment:
      - DATABASE_URL=postgres://${PROJECT_NAME:-agenticflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${PROJECT_NAME:-agenticflow}
      - PROJECT_NAME=${PROJECT_NAME:-agenticflow}
      - AGENTICFLOW_MASTER_PASSWORD=${AGENTICFLOW_MASTER_PASSWORD:-changeme}
      - NODE_OPTIONS=--max-old-space-size=512
      - MCP_SERVER_INIT_REQ_TIMEOUT_SEC=120
      # Required configuration for remote agent context ingestion (Agenticflow memory system)
      - VAULT_PATH=/vault
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-Xenova/jina-embeddings-v2-small-en}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_ATTRIBUTION_ENABLED=${AI_ATTRIBUTION_ENABLED:-false}
      - AI_ATTRIBUTION_CALLOUT_TYPE=${AI_ATTRIBUTION_CALLOUT_TYPE:-ai}
      - AI_ATTRIBUTION_INCLUDE_MODEL=${AI_ATTRIBUTION_INCLUDE_MODEL:-true}
      - AI_ATTRIBUTION_INCLUDE_DATE=${AI_ATTRIBUTION_INCLUDE_DATE:-true}
      - AGENTICFLOW_LOW_RESOURCE_MODE=${AGENTICFLOW_LOW_RESOURCE_MODE:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Allows filesystem MCP server to access the host
      - "${VAULT_PATH:-./data/vault}:/vault"
      # Config directory for MCP server registration JSON files
      - ./config:/config:rw
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    restart: unless-stopped

  # ─── Vector Database (for Obsidian memory) ────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  # ─── Postgres (MCPJungle persistence) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${PROJECT_NAME:-agenticflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${PROJECT_NAME:-agenticflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PROJECT_NAME:-agenticflow}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
