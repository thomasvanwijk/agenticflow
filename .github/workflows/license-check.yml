name: License Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  license-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            cli/package-lock.json
            agenticflow-memory-mcp/package-lock.json

      - name: Check CLI Licenses
        run: |
          cd cli
          npm ci
          npx license-checker --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;(MIT OR CC0-1.0)' --excludePrivatePackages

      - name: Check Memory MCP Licenses
        run: |
          cd agenticflow-memory-mcp
          npm ci
          npx license-checker --production --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;LGPL-3.0-or-later;BlueOak-1.0.0;(MIT OR CC0-1.0)' --exclude "@chroma-core/ai-embeddings-common,@chroma-core/default-embed,flatbuffers" --excludePrivatePackages
