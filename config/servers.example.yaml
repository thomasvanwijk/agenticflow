# MCP Server registrations
# Copy to servers.yaml and configure the servers you want to use.
# servers.yaml is gitignored.

# ─── Jira ─────────────────────────────────────────────────────────────────────
# Uncomment and fill in to enable Jira.
# - name: jira
#   type: stdio
#   command: npx
#   args: ["@atlassian/jira-mcp"]
#   env:
#     ATLASSIAN_URL: "https://YOUR-DOMAIN.atlassian.net"
#     ATLASSIAN_EMAIL: "you@example.com"
#     ATLASSIAN_API_TOKEN: "your-api-token"
#   group: work

# ─── Confluence ───────────────────────────────────────────────────────────────
