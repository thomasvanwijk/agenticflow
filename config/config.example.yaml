# ⚠️ REFERENCE ONLY ⚠️
# This file is legacy and not used by the Agenticflow CLI or services.
# Configuration is managed via the .env file (for global settings)
# and JSON files in config/servers.d/ (for MCP servers).

# ─── Gateway ──────────────────────────────────────────────────────────────────
gateway:
  host_port: 18080       # Port used in the .env file
  auth_token: ""         # Managed via Caddy/Auth Proxy

# ─── Obsidian Memory ──────────────────────────────────────────────────────────
memory:
  vault_path: "/absolute/path/to/vault"  # Managed via .env (VAULT_PATH)

  # Embedding provider: "local" (default), "ollama" or "openai"
  embedding:
    provider: "local"
    model: "Xenova/jina-embeddings-v2-small-en"

    # Settings below are managed via .env
    # openai_api_key: "sk-..."
    # ollama_base_url: "http://localhost:11434"

# ─── Database ─────────────────────────────────────────────────────────────────
postgres:
  password: "changeme"   # Managed via .env (POSTGRES_PASSWORD)
